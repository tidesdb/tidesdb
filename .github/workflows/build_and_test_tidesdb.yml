name: TidesDB CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            arch: x64
          - os: ubuntu-latest
            name: Linux x86
            arch: x86
          - os: macos-latest
            name: macOS x64
            arch: x64
          - os: macos-latest
            name: macOS x86
            arch: x86
          - os: windows-latest
            name: Windows MSVC x64
            compiler: msvc
            arch: x64
          - os: windows-latest
            name: Windows MSVC x86
            compiler: msvc
            arch: x86
          - os: windows-latest
            name: Windows MinGW x64
            compiler: mingw
            arch: x64
          - os: windows-latest
            name: Windows MinGW x86
            compiler: mingw
            arch: x86
          - os: ubuntu-latest
            name: Linux PowerPC 32-bit
            arch: ppc
            compiler: gcc-powerpc
          - os: ubuntu-latest
            name: macOS 10.6.8 PowerPC G5
            arch: ppc-macos
            compiler: gcc-powerpc
            target_os: macos
          - os: ubuntu-latest
            name: Linux RISC-V 64-bit
            arch: riscv64
            compiler: gcc-riscv64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          sudo apt update
          sudo apt install -y libzstd-dev liblz4-dev libsnappy-dev build-essential cmake pkg-config

      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib libc6-dev-i386 \
            libzstd-dev:i386 liblz4-dev:i386 libsnappy-dev:i386 build-essential cmake pkg-config

      - name: Install dependencies (Linux PowerPC)
        if: runner.os == 'Linux' && matrix.arch == 'ppc'
        run: |
          sudo apt update
          sudo apt install -y \
            crossbuild-essential-powerpc \
            gcc-powerpc-linux-gnu \
            g++-powerpc-linux-gnu \
            qemu-user-static \
            build-essential cmake pkg-config \
            git wget

          mkdir -p /tmp/ppc-deps
          cd /tmp/ppc-deps

          wget https://github.com/lz4/lz4/archive/refs/tags/v1.9.4.tar.gz -O lz4.tar.gz
          tar xzf lz4.tar.gz
          cd lz4-1.9.4
          make CC=powerpc-linux-gnu-gcc lib
          sudo make CC=powerpc-linux-gnu-gcc PREFIX=/usr/powerpc-linux-gnu install
          cd ..

          wget https://github.com/facebook/zstd/releases/download/v1.5.5/zstd-1.5.5.tar.gz
          tar xzf zstd-1.5.5.tar.gz
          cd zstd-1.5.5
          make CC=powerpc-linux-gnu-gcc lib
          sudo make CC=powerpc-linux-gnu-gcc PREFIX=/usr/powerpc-linux-gnu install
          cd ..

          wget https://github.com/google/snappy/archive/refs/tags/1.1.10.tar.gz -O snappy.tar.gz
          tar xzf snappy.tar.gz
          cd snappy-1.1.10
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=powerpc \
            -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=/usr/powerpc-linux-gnu \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF
          cmake --build build
          sudo cmake --install build

      - name: Install dependencies (Linux RISC-V 64-bit)
        if: runner.os == 'Linux' && matrix.arch == 'riscv64'
        run: |
          # cmake, build-essential, pkg-config, git and wget ship on the runner image;
          # only the cross toolchain and qemu need installing. retries plus a per-connection
          # timeout keep a slow or stalling apt mirror from hanging the job indefinitely.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30 \
            crossbuild-essential-riscv64 \
            gcc-riscv64-linux-gnu \
            g++-riscv64-linux-gnu \
            qemu-user-static

          mkdir -p /tmp/riscv64-deps
          cd /tmp/riscv64-deps

          wget https://github.com/lz4/lz4/archive/refs/tags/v1.9.4.tar.gz -O lz4.tar.gz
          tar xzf lz4.tar.gz
          cd lz4-1.9.4
          make CC=riscv64-linux-gnu-gcc lib
          sudo make CC=riscv64-linux-gnu-gcc PREFIX=/usr/riscv64-linux-gnu install
          cd ..

          wget https://github.com/facebook/zstd/releases/download/v1.5.5/zstd-1.5.5.tar.gz
          tar xzf zstd-1.5.5.tar.gz
          cd zstd-1.5.5
          make CC=riscv64-linux-gnu-gcc lib
          sudo make CC=riscv64-linux-gnu-gcc PREFIX=/usr/riscv64-linux-gnu install
          cd ..

          wget https://github.com/google/snappy/archive/refs/tags/1.1.10.tar.gz -O snappy.tar.gz
          tar xzf snappy.tar.gz
          cd snappy-1.1.10
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=riscv64 \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=riscv64-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=/usr/riscv64-linux-gnu \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF
          cmake --build build
          sudo cmake --install build

      - name: Install dependencies (macOS PowerPC cross-compile)
        if: runner.os == 'Linux' && matrix.arch == 'ppc-macos'
        run: |
          sudo apt update
          sudo apt install -y \
            crossbuild-essential-powerpc \
            gcc-powerpc-linux-gnu \
            g++-powerpc-linux-gnu \
            qemu-user-static \
            build-essential cmake pkg-config \
            git wget

          mkdir -p /tmp/ppc-deps
          cd /tmp/ppc-deps

          wget https://github.com/lz4/lz4/archive/refs/tags/v1.9.4.tar.gz -O lz4.tar.gz
          tar xzf lz4.tar.gz
          cd lz4-1.9.4
          make CC=powerpc-linux-gnu-gcc lib
          sudo make CC=powerpc-linux-gnu-gcc PREFIX=/usr/powerpc-linux-gnu install
          cd ..

          wget https://github.com/facebook/zstd/releases/download/v1.5.5/zstd-1.5.5.tar.gz
          tar xzf zstd-1.5.5.tar.gz
          cd zstd-1.5.5
          make CC=powerpc-linux-gnu-gcc lib
          sudo make CC=powerpc-linux-gnu-gcc PREFIX=/usr/powerpc-linux-gnu install
          cd ..

          wget https://github.com/google/snappy/archive/refs/tags/1.1.10.tar.gz -O snappy.tar.gz
          tar xzf snappy.tar.gz
          cd snappy-1.1.10
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=powerpc \
            -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=/usr/powerpc-linux-gnu \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF
          cmake --build build
          sudo cmake --install build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install zstd lz4 snappy

      - name: Setup vcpkg binary cache (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:GITHUB_WORKSPACE\vcpkg_cache"
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg packages (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: actions/cache@v4
        with:
          path: vcpkg_cache
          key: vcpkg-${{ matrix.compiler }}-${{ matrix.arch }}-${{ hashFiles('**/vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ matrix.compiler }}-${{ matrix.arch }}-
            vcpkg-${{ matrix.compiler }}-

      - name: Install dependencies (Windows MSVC x64)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull
          .\vcpkg.exe install zstd:x64-windows snappy:x64-windows lz4:x64-windows pthreads:x64-windows

      - name: Install dependencies (Windows MSVC x86)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x86'
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull
          .\vcpkg.exe install zstd:x86-windows snappy:x86-windows lz4:x86-windows pthreads:x86-windows

      - name: Setup MSYS2 (MinGW)
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'x86' && 'MINGW32' || 'MINGW64' }}
          update: false
          # propagate /mingw{32,64}/bin onto the runner's Windows PATH so
          # subsequent bash/pwsh steps (notably `ctest`) can locate the
          # compression DLLs at runtime; without this we hit STATUS_DLL_NOT_FOUND.
          path-type: inherit
          # snappy is built from source for both arches in the next step (see
          # there for why), so MSYS2's prebuilt snappy package is not installed.
          install: ${{ matrix.arch == 'x86' && 'git mingw-w64-i686-gcc mingw-w64-i686-cmake mingw-w64-i686-make mingw-w64-i686-pkgconf mingw-w64-i686-zstd mingw-w64-i686-lz4' || 'git mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-make mingw-w64-x86_64-pkgconf mingw-w64-x86_64-zstd mingw-w64-x86_64-lz4' }}

      - name: Build snappy from source (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: |
          # Build snappy 1.2.2 from source for both arches so the two legs use
          # an identical snappy: shared libsnappy.dll plus SnappyConfig.cmake
          # pointing at the shared variant. MSYS2 dropped mingw-w64-i686-snappy
          # in Oct 2024 (no x86 package at all), and its prebuilt x64 package
          # ships only the static C++ archive which fails to link from our
          # C-only test exes. Building ourselves keeps both legs consistent.
          git clone --depth 1 --branch 1.2.2 https://github.com/google/snappy.git /tmp/snappy
          cd /tmp/snappy
          cmake -S . -B build -G "MinGW Makefiles" \
            -DCMAKE_INSTALL_PREFIX="$MINGW_PREFIX" \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF \
            -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release
          cmake --install build

      - name: Configure CMake (Linux/macOS x64)
        if: runner.os != 'Windows' && matrix.arch == 'x64'
        shell: bash
        run: cmake -S . -B build -DTIDESDB_BUILD_TESTS=ON -DTIDESDB_WITH_SANITIZER=ON

      - name: Lint -Wmaybe-uninitialized (Linux x64 GCC, optimized)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          # -Wmaybe-uninitialized only fires under optimization, so use a dedicated
          # RelWithDebInfo build with the TIDESDB_WARN_MAYBE_UNINIT cmake option (the main
          # sanitizer build above is -O0, where the analysis is a no-op). this build is
          # isolated in build-wmu and does not affect the sanitizer build. the gate fails
          # only on warnings in our own src/; third-party external/ is build-only.
          cmake -S . -B build-wmu -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DTIDESDB_BUILD_TESTS=ON -DTIDESDB_WARN_MAYBE_UNINIT=ON
          cmake --build build-wmu -j"$(nproc)" 2>&1 | tee build-wmu.log
          if grep -E '\[-Wmaybe-uninitialized\]' build-wmu.log | grep '/src/'; then
            echo "::error::-Wmaybe-uninitialized reported a warning in src/"
            exit 1
          fi
          echo "no -Wmaybe-uninitialized warnings in src/"

      - name: Configure CMake (Linux x86)
        if: runner.os == 'Linux' && matrix.arch == 'x86'
        shell: bash
        run: |
          export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
          cmake -S . -B build \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_EXE_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
            -DCMAKE_MODULE_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=ON

      - name: Configure CMake (Linux PowerPC)
        if: runner.os == 'Linux' && matrix.arch == 'ppc'
        shell: bash
        run: |
          export PKG_CONFIG_PATH=/usr/powerpc-linux-gnu/lib/pkgconfig
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=powerpc \
            -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
            -DCMAKE_C_FLAGS="-mlongcall" \
            -DCMAKE_FIND_ROOT_PATH=/usr/powerpc-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_EXE_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DCMAKE_MODULE_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=OFF

      - name: Configure CMake (Linux RISC-V 64-bit)
        if: runner.os == 'Linux' && matrix.arch == 'riscv64'
        shell: bash
        run: |
          export PKG_CONFIG_PATH=/usr/riscv64-linux-gnu/lib/pkgconfig
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=riscv64 \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=riscv64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/riscv64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_EXE_LINKER_FLAGS="-L/usr/riscv64-linux-gnu/lib -L/usr/lib/riscv64-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L/usr/riscv64-linux-gnu/lib -L/usr/lib/riscv64-linux-gnu" \
            -DCMAKE_MODULE_LINKER_FLAGS="-L/usr/riscv64-linux-gnu/lib -L/usr/lib/riscv64-linux-gnu" \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=OFF

      - name: Configure CMake (macOS PowerPC cross-compile)
        if: runner.os == 'Linux' && matrix.arch == 'ppc-macos'
        shell: bash
        run: |
          export PKG_CONFIG_PATH=/usr/powerpc-linux-gnu/lib/pkgconfig
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=powerpc \
            -DCMAKE_C_COMPILER=powerpc-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=powerpc-linux-gnu-g++ \
            -DCMAKE_C_FLAGS="-mlongcall" \
            -DCMAKE_FIND_ROOT_PATH=/usr/powerpc-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DCMAKE_EXE_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DCMAKE_MODULE_LINKER_FLAGS="-L/usr/powerpc-linux-gnu/lib -L/usr/lib/powerpc-linux-gnu" \
            -DUSE_HOMEBREW=OFF \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=OFF

      - name: Configure CMake (macOS x86)
        if: runner.os == 'macOS' && matrix.arch == 'x86'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_EXE_LINKER_FLAGS="-m32" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32" \
            -DCMAKE_MODULE_LINKER_FLAGS="-m32" \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=ON

      # NOTE: TIDESDB_WITH_SANITIZER on Windows only adds extra warning flags;
      # neither MSVC nor MinGW gates real ASan/UBSan on it (see CMakeLists.txt:66-103).
      # Keep it OFF on Windows to avoid the noise.
      - name: Configure CMake (Windows MSVC x64)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 -DTIDESDB_BUILD_TESTS=ON -DTIDESDB_WITH_SANITIZER=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake (Windows MSVC x86)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x86'
        shell: pwsh
        run: |
          cmake -S . -B build -A Win32 -DTIDESDB_BUILD_TESTS=ON -DTIDESDB_WITH_SANITIZER=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake (Windows MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" \
            -DTIDESDB_BUILD_TESTS=ON \
            -DTIDESDB_WITH_SANITIZER=OFF

      - name: Build (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Build
        if: matrix.compiler != 'mingw'
        run: cmake --build build --config Release

      - name: Run tests
        shell: bash
        run: |
          cd build
          if [ "${{ matrix.arch }}" == "ppc" ]; then
            # Linux PowerPC 32-bit: attempt qemu-user-static execution. older qemu
            # versions segfaulted on PowerPC pthread mutex internals and lwsync
            # barrier translation; modern qemu (8.x+) has improved this. trailing
            # || true keeps the workflow green on emulation regressions while still
            # logging the segfault for diagnosis. wrap in `timeout` so a hung qemu
            # cannot burn the full ctest budget.
            echo "**Linux PowerPC 32-bit: running tests via qemu-user-static (best effort)"
            # TIDESDB_QEMU_SKIP activates the in-test guards for cases qemu usermode cannot emulate
            # (allocator swap, oom, fork/exec children) -- otherwise the first such test crashes the
            # whole binary and every later test goes unrun. qemu-user forwards the host env to the
            # target, so getenv() sees it inside the emulated process.
            TIDESDB_QEMU_SKIP=1 timeout 1800 qemu-ppc-static -L /usr/powerpc-linux-gnu ./tidesdb_tests \
              || echo "**qemu-ppc-static exit non-zero -- see log above; build verification still valid"
          elif [ "${{ matrix.arch }}" == "ppc-macos" ]; then
            # macOS PowerPC (G5): the cross-build emits Mach-O PowerPC binaries
            # targeting Mac OS X 10.6.8 which Linux has no way to execute --
            # Darling does not support PowerPC, and qemu-system-ppc booting an
            # actual OS X PowerPC VM is impractical (licensed installer ISO +
            # 10+ min boot per CI). build verification is the realistic ceiling.
            echo "**macOS PowerPC (G5): build verified, runtime tests not possible on a Linux runner (Mach-O PPC has no Linux execution path)"
          elif [ "${{ matrix.arch }}" == "riscv64" ]; then
            # TIDESDB_QEMU_SKIP activates the in-test guards for cases qemu usermode cannot emulate
            # (allocator swap, oom, fork/exec children) so one such test does not abort the binary
            # and skip every test after it. qemu-user forwards the host env to the target.
            CTEST_OUTPUT_ON_FAILURE=1 TIDESDB_QEMU_SKIP=1 qemu-riscv64-static -L /usr/riscv64-linux-gnu ./tidesdb_tests || true
            echo "**Linux RISC-V 64-bit tests run via QEMU emulation"
          else
            if [ "${{ matrix.arch }}" == "x86" ]; then
              # the 32-bit address space is only ~3 GiB, and ASan's own bookkeeping
              # (per-thread FakeStack, redzones, the freed-allocation quarantine) claims
              # most of it across a long single-process suite. cap that overhead so the
              # many-thread concurrent multi-CF tests have room, keeping this lane's
              # detection while the x86-64 ASan job runs the defaults. the engine also
              # clamps its memory-pressure budget to the addressable space so its write
              # backpressure engages before the address space is exhausted.
              export ASAN_OPTIONS="detect_stack_use_after_return=0:quarantine_size_mb=64:max_redzone=256:allocator_release_to_os_interval_ms=0"
            fi
            ctest -V --output-on-failure --timeout 5400 --build-config Release
          fi

  create-portable-db:
    runs-on: ubuntu-latest
    needs: build-and-test
    name: Create Portable Test Database (x64 Linux)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libzstd-dev liblz4-dev libsnappy-dev build-essential cmake
      
      - name: Build TidesDB
        run: |
          cmake -S . -B build
          cmake --build build --config Release
      
      - name: Create test database
        run: |
          cd build
          cat > create_db.c << 'EOF'
          #include "../src/tidesdb.h"
          #include <stdio.h>
          #include <string.h>
          #include <unistd.h>
          
          int main() {
              tidesdb_t *db;
              tidesdb_config_t cfg = tidesdb_default_config();
              cfg.db_path = "./testdb";
              cfg.num_flush_threads = 1;
              cfg.log_level = TDB_LOG_DEBUG;
              cfg.num_compaction_threads = 1;
              if (tidesdb_open(&cfg, &db) != 0) return 1;

              tidesdb_column_family_config_t cf_cfg = tidesdb_default_column_family_config();
              cf_cfg.write_buffer_size = 1024;
              cf_cfg.enable_bloom_filter = 1;
              cf_cfg.enable_block_indexes = 1;
              if (tidesdb_create_column_family(db, "test_cf", &cf_cfg) != 0) return 1;

              tidesdb_column_family_t *cf = tidesdb_get_column_family(db, "test_cf");
              tidesdb_txn_t *txn;
              if (tidesdb_txn_begin(db, &txn) != 0) return 1;

              for (int i = 0; i < 100; i++) {
                  char key[64], value[128];
                  snprintf(key, sizeof(key), "key_%d", i);
                  snprintf(value, sizeof(value), "value_%d", i);
                  tidesdb_txn_put(txn, cf, (uint8_t*)key, strlen(key) + 1, (uint8_t*)value, strlen(value) + 1, 0);
              }
              tidesdb_txn_commit(txn);
              tidesdb_txn_free(txn);
              tidesdb_flush_memtable(cf);
              sleep(1);
              tidesdb_compact(cf);
              sleep(1);
              tidesdb_close(db);
              printf("Database created with 100 keys\n");
              return 0;
          }
          EOF
          gcc -o create_db create_db.c -I../src -I../external -L. -ltidesdb -lzstd -llz4 -lsnappy -lpthread -lm
          LD_PRELOAD=/lib/x86_64-linux-gnu/libasan.so.8 LD_LIBRARY_PATH=. ./create_db

      - name: Verify database contents before upload
        run: |
          echo "=== Database directory structure ==="
          ls -laR build/testdb/
          echo ""
          echo "=== Looking for SSTable files ==="
          find build/testdb -name "*.klog" -o -name "*.vlog" | head -20
          echo ""
          echo "=== Looking for WAL files ==="
          find build/testdb -name "*.log" | head -20
          echo ""
          echo "=== Looking for INI files ==="
          find build/testdb -name "*.ini"

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: portable-db
          path: build/testdb/
          retention-days: 1

  verify-portable-db:
    runs-on: ${{ matrix.os }}
    needs: create-portable-db
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows MSVC x64
            compiler: msvc
            arch: x64
          - os: windows-latest
            name: Windows MSVC x86
            compiler: msvc
            arch: x86
          - os: windows-latest
            name: Windows MinGW x64
            compiler: mingw
            arch: x64
          - os: windows-latest
            name: Windows MinGW x86
            compiler: mingw
            arch: x86
          - os: macos-latest
            name: macOS x64
            arch: x64
          - os: macos-latest
            name: macOS x86
            arch: x86
          - os: ubuntu-latest
            name: Linux x86
            arch: x86
    
    name: Test portability on ${{ matrix.name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download database
        uses: actions/download-artifact@v4
        with:
          name: portable-db
          path: testdb

      - name: Verify downloaded database contents
        shell: bash
        run: |
          echo "=== Downloaded database structure ==="
          ls -laR testdb/ || ls -laR testdb || true
          echo ""
          echo "=== Looking for SSTable files ==="
          find testdb -name "*.klog" -o -name "*.vlog" | head -20 || true
          echo ""
          echo "=== Looking for WAL files ==="
          find testdb -name "*.log" | head -20 || true
          echo ""
          echo "=== Looking for INI files ==="
          find testdb -name "*.ini" || true

      - name: Install dependencies (Linux x86)
        if: runner.os == 'Linux' && matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib libc6-dev-i386 \
            libzstd-dev:i386 liblz4-dev:i386 libsnappy-dev:i386 build-essential cmake pkg-config
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd lz4 snappy
      
      - name: Setup vcpkg binary cache (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:GITHUB_WORKSPACE\vcpkg_cache"
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg packages (Windows MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: actions/cache@v4
        with:
          path: vcpkg_cache
          key: vcpkg-verify-${{ matrix.compiler }}-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-verify-${{ matrix.compiler }}-${{ matrix.arch }}-
            vcpkg-${{ matrix.compiler }}-${{ matrix.arch }}-

      - name: Install dependencies (Windows MSVC x64)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x64'
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          .\vcpkg.exe install zstd:x64-windows snappy:x64-windows lz4:x64-windows pthreads:x64-windows

      - name: Install dependencies (Windows MSVC x86)
        if: matrix.compiler == 'msvc' && matrix.arch == 'x86'
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          .\vcpkg.exe install zstd:x86-windows snappy:x86-windows lz4:x86-windows pthreads:x86-windows

      - name: Setup MSYS2 (MinGW)
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'x86' && 'MINGW32' || 'MINGW64' }}
          update: false
          # propagate /mingw{32,64}/bin onto the runner's Windows PATH so
          # subsequent bash/pwsh steps (notably `ctest`) can locate the
          # compression DLLs at runtime; without this we hit STATUS_DLL_NOT_FOUND.
          path-type: inherit
          # snappy is built from source for both arches in the next step (see
          # there for why), so MSYS2's prebuilt snappy package is not installed.
          install: ${{ matrix.arch == 'x86' && 'git mingw-w64-i686-gcc mingw-w64-i686-cmake mingw-w64-i686-make mingw-w64-i686-pkgconf mingw-w64-i686-zstd mingw-w64-i686-lz4' || 'git mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-make mingw-w64-x86_64-pkgconf mingw-w64-x86_64-zstd mingw-w64-x86_64-lz4' }}

      - name: Build snappy from source (MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: |
          # Build snappy 1.2.2 from source for both arches so the two legs use
          # an identical snappy: shared libsnappy.dll plus SnappyConfig.cmake
          # pointing at the shared variant. MSYS2 dropped mingw-w64-i686-snappy
          # in Oct 2024 (no x86 package at all), and its prebuilt x64 package
          # ships only the static C++ archive which fails to link from our
          # C-only test exes. Building ourselves keeps both legs consistent.
          git clone --depth 1 --branch 1.2.2 https://github.com/google/snappy.git /tmp/snappy
          cd /tmp/snappy
          cmake -S . -B build -G "MinGW Makefiles" \
            -DCMAKE_INSTALL_PREFIX="$MINGW_PREFIX" \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF \
            -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release
          cmake --install build
      
      - name: Build TidesDB (Windows MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DTIDESDB_WITH_SANITIZER=OFF
          cmake --build build --config Release

      - name: Build TidesDB
        if: matrix.compiler != 'mingw'
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            if [ "${{ matrix.arch }}" == "x86" ]; then
              cmake -S . -B build -A Win32 -DTIDESDB_WITH_SANITIZER=OFF -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
            else
              cmake -S . -B build -A x64 -DTIDESDB_WITH_SANITIZER=OFF -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
            fi
          elif [ "$RUNNER_OS" == "Linux" ]; then
            export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
            cmake -S . -B build \
              -DCMAKE_C_FLAGS="-m32" \
              -DCMAKE_EXE_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
              -DCMAKE_SHARED_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
              -DCMAKE_MODULE_LINKER_FLAGS="-m32 -L/usr/lib/i386-linux-gnu" \
              -DTIDESDB_WITH_SANITIZER=OFF
          else
            cmake -S . -B build
          fi
          cmake --build build --config Release

      # MinGW path runs under msys2 shell so cmake/cc.exe see the MSYS2 env;
      # using system cmake from Git Bash invokes mingw32-cc.exe without its
      # environment and the trial compile fails with no useful output.
      - name: Verify database (Windows MinGW)
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: |
          cd build
          cat > verify_db.c << 'EOF'
          #include "../src/tidesdb.h"
          #include <stdio.h>
          #include <string.h>

          int main() {
              tidesdb_t *db;
              tidesdb_config_t cfg = tidesdb_default_config();
              cfg.db_path = "../testdb";
              cfg.log_level = TDB_LOG_DEBUG;
              cfg.num_flush_threads = 1;
              cfg.num_compaction_threads = 1;
              if (tidesdb_open(&cfg, &db) != 0) { fprintf(stderr, "Failed to open\n"); return 1; }

              tidesdb_column_family_t *cf = tidesdb_get_column_family(db, "test_cf");
              if (!cf) { fprintf(stderr, "CF not found\n"); return 1; }

              tidesdb_txn_t *txn;
              if (tidesdb_txn_begin(db, &txn) != 0) return 1;

              for (int i = 0; i < 100; i++) {
                  char key[64], expected[128];
                  snprintf(key, sizeof(key), "key_%d", i);
                  snprintf(expected, sizeof(expected), "value_%d", i);
                  uint8_t *value = NULL;
                  size_t value_size = 0;
                  if (tidesdb_txn_get(txn, cf, (uint8_t*)key, strlen(key) + 1, &value, &value_size) != 0) {
                      fprintf(stderr, "Key not found: %s\n", key);
                      return 1;
                  }
                  if (value_size != strlen(expected) + 1 || memcmp(value, expected, strlen(expected)) != 0) {
                      fprintf(stderr, "Value mismatch\n");
                      return 1;
                  }
                  free(value);
              }
              tidesdb_txn_free(txn);
              tidesdb_close(db);
              printf("All 100 keys verified successfully!\n");
              return 0;
          }
          EOF
          mv verify_db.c ../
          cat >> ../CMakeLists.txt << 'CMAKEEOF'

          add_executable(verify_db verify_db.c)
          target_link_libraries(verify_db PRIVATE tidesdb)
          target_include_directories(verify_db PRIVATE external)
          CMAKEEOF
          cd ..
          cmake build
          cd build
          cmake --build . --config Release
          ./verify_db.exe

      - name: Verify database
        if: matrix.compiler != 'mingw'
        shell: bash
        run: |
          cd build
          cat > verify_db.c << 'EOF'
          #include "../src/tidesdb.h"
          #include <stdio.h>
          #include <string.h>

          int main() {
              tidesdb_t *db;
              tidesdb_config_t cfg = tidesdb_default_config();
              cfg.db_path = "../testdb";
              cfg.log_level = TDB_LOG_DEBUG;
              cfg.num_flush_threads = 1;
              cfg.num_compaction_threads = 1;
              if (tidesdb_open(&cfg, &db) != 0) { fprintf(stderr, "Failed to open\n"); return 1; }

              /* Get existing column family from the portable database */
              tidesdb_column_family_t *cf = tidesdb_get_column_family(db, "test_cf");
              if (!cf) { fprintf(stderr, "CF not found\n"); return 1; }

              tidesdb_txn_t *txn;
              if (tidesdb_txn_begin(db, &txn) != 0) return 1;

              for (int i = 0; i < 100; i++) {
                  char key[64], expected[128];
                  snprintf(key, sizeof(key), "key_%d", i);
                  snprintf(expected, sizeof(expected), "value_%d", i);
                  uint8_t *value = NULL;
                  size_t value_size = 0;
                  if (tidesdb_txn_get(txn, cf, (uint8_t*)key, strlen(key) + 1, &value, &value_size) != 0) {
                      fprintf(stderr, "Key not found: %s\n", key);
                      return 1;
                  }
                  if (value_size != strlen(expected) + 1 || memcmp(value, expected, strlen(expected)) != 0) {
                      fprintf(stderr, "Value mismatch\n");
                      return 1;
                  }
                  free(value);
              }
              tidesdb_txn_free(txn);
              tidesdb_close(db);
              printf("All 100 keys verified successfully!\n");
              return 0;
          }
          EOF

          if [ "$RUNNER_OS" == "Windows" ]; then
            mv verify_db.c ../
            sed -i 's|\.\./testdb|../../testdb|g' ../verify_db.c
            cat >> ../CMakeLists.txt << 'CMAKEEOF'

          add_executable(verify_db verify_db.c)
          target_link_libraries(verify_db PRIVATE tidesdb)
          target_include_directories(verify_db PRIVATE external)
          CMAKEEOF
            # Reconfigure and build from build directory
            cd ..
            cmake build
            cd build
            cmake --build . --config Release
            cd Release
            ./verify_db.exe
          elif [ "$RUNNER_OS" == "Linux" ]; then
            gcc -m32 -o verify_db verify_db.c \
              -I../src -I../external \
              -L. -L/usr/lib/i386-linux-gnu \
              -ltidesdb -lzstd -llz4 -lsnappy -lpthread -lm
            LD_LIBRARY_PATH=.:/usr/lib/i386-linux-gnu ./verify_db
          else
            gcc -o verify_db verify_db.c -I../src -I../external -I/opt/homebrew/include -I/usr/local/include -L. -L/opt/homebrew/lib -L/usr/local/lib -ltidesdb -lzstd -llz4 -lsnappy -lpthread -lm
            DYLD_LIBRARY_PATH=.:/opt/homebrew/lib:/usr/local/lib ./verify_db
          fi

