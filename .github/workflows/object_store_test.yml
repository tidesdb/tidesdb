name: Object Store Tests (MinIO)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  objstore-test:
    runs-on: ubuntu-latest
    name: Object Store Integration Tests

    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential liblz4-dev libzstd-dev libsnappy-dev \
            libcurl4-openssl-dev libssl-dev

      - name: Create test bucket
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 minioadmin minioadmin
          /tmp/mc mb local/tidesdb-test || true

      - name: Build TidesDB with S3 connector
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DTIDESDB_WITH_S3=ON -DTIDESDB_WITH_SANITIZER=OFF
          cmake --build . -j$(nproc)

      - name: Run standard test suite
        run: |
          cd build
          ./tidesdb_tests

      - name: Run object store tests (filesystem connector)
        run: |
          cd build
          ./tidesdb_tests test_objstore_fs_roundtrip
          ./tidesdb_tests test_objstore_cold_start
          ./tidesdb_tests test_objstore_compaction_and_iterators
          ./tidesdb_tests test_unified_iterator_consistency

      - name: Run object store tests (MinIO S3 connector)
        env:
          TIDESDB_S3_ENDPOINT: localhost:9000
          TIDESDB_S3_BUCKET: tidesdb-test
          TIDESDB_S3_ACCESS_KEY: minioadmin
          TIDESDB_S3_SECRET_KEY: minioadmin
        run: |
          cd build
          ./tidesdb_tests test_objstore_s3 || echo "S3 integration tests not yet implemented"
